prefixes:
  base: http://example.com/base/
  xsd: http://www.w3.org/2001/XMLSchema#
mappings:
  Person_map:
    sources:
    - query: SELECT * FROM "Person"
    s: base:Person/ID=$(ID)
    po:
    - [a, 'base:Person']
    - p: base:Person#ID
      o:
      - value: $(ID)
        datatype: xsd:integer
    - ['base:Person#Name', $(Name)]
    - ['base:Person#DateOfBirth', $(DateOfBirth)]
